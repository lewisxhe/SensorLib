version: "0.4.1"
description: "Commonly used I2C & SPI sensor drivers for ESP-IDF / Arduino"
license: "MIT"
url: "https://github.com/lewisxhe/SensorLib"
repository: "https://github.com/lewisxhe/SensorLib.git"
files:
  use_gitignore: true
  exclude:
    - "tests/**/*"
    - "**/.github/**/*"
